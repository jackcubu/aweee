<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đọc truyện</title>
    <link rel="icon" type="image/png" href="https://cdn.discordapp.com/attachments/1485272998582685757/1527825160181387344/Khong_Co_Tieu_e420_20260718064927.png?ex=6a5c118f&is=6a5ac00f&hm=06a599db20f909785a2ccbcca8c57817f8480cfc573def2c2494fcf5dbfd10c1">
    <!-- Nhớ trỏ đúng đến file CSS của bạn -->
    <link rel="stylesheet" href="css/reader.css">
</head>
<body>

    <!-- Header: Logo và Nút chuyển sáng/tối -->
    <header class="reader-header">
        <a href="index.html" class="logo">Manga<span>AG</span></a>
        <button id="theme-toggle">Dark/Light Mode</button>
    </header>

    <div class="glass-container">
        <h2 id="chapter-title">Đang tải...</h2>
        <div id="image-list"></div> <!-- Ảnh sẽ được chèn vào đây bởi reader.js -->
    </div>

    <!-- Thanh điều hướng cố định (Fixed) -->
    <div class="navigation">
        <button id="prev-btn">←</button>
        
        <div class="menu-container">
            <button id="menu-btn">☰</button>
            <div id="chapter-popup" class="popup">
                <ul id="popup-list"></ul>
            </div>
        </div>

        <button id="next-btn">→</button>
    </div>

    <!-- Import file JS -->
    <script src="js/reader.js"></script>
</body>
</html>
